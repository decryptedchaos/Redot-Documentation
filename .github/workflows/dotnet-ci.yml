name: .NET CI

on:
  push:
  pull_request:

jobs:
  formatting:
    name: Formatting checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Check formatting
        run: dotnet format --verify-no-changes

  compile:
    name: Build
    runs-on: ubuntu-latest
    needs: formatting
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Redot-Documentation.sln

      - name: Build
        run: dotnet build Redot-Documentation.sln --configuration Release

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Redot-Documentation.sln

      - name: Test
        run: dotnet test Redot-Documentation.sln --configuration Release